<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0f00"/>
      <stop offset="100%" stop-color="#3d1f00"/>
    </linearGradient>
    <radialGradient id="compass-glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1c0f00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#compass-glow)"/>
  <!-- Map grid lines -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="350" x2="600" y2="350" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="500" x2="600" y2="500" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="800" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="0" x2="450" y2="800" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <!-- Compass rose -->
  <circle cx="300" cy="340" r="90" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="300" cy="340" r="65" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- N S E W points -->
  <polygon points="300,255 288,310 300,300 312,310" fill="#f59e0b" opacity="0.9"/>
  <polygon points="300,425 288,370 300,380 312,370" fill="#d97706" opacity="0.7"/>
  <polygon points="215,340 270,328 260,340 270,352" fill="#d97706" opacity="0.7"/>
  <polygon points="385,340 330,328 340,340 330,352" fill="#f59e0b" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="300" cy="340" r="10" fill="#f59e0b" opacity="0.9"/>
  <!-- Dotted travel path -->
  <path d="M80 500 Q180 420 260 460 Q340 500 420 440 Q480 400 520 350" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,6" fill="none" opacity="0.6"/>
  <circle cx="80" cy="500" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="260" cy="460" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="420" cy="440" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="520" cy="350" r="8" fill="#ef4444" opacity="0.85"/>
  <!-- N label -->
  <text x="300" y="248" fill="#f59e0b" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" opacity="0.9">N</text>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#0d0700" opacity="0.85"/>
  <text x="300" y="715" fill="#fde68a" font-family="Georgia, serif" font-size="38" font-weight="700" text-anchor="middle">The Reader Map</text>
  <text x="300" y="757" fill="#f59e0b" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" opacity="0.85">Samiul Islam</text>
</svg>
