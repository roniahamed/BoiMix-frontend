<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d0a52"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#9b59d0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0533" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Light rays -->
  <line x1="300" y1="0" x2="50" y2="600" stroke="#c084fc" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="0" x2="150" y2="700" stroke="#c084fc" stroke-width="2" opacity="0.15"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#e9d5ff" stroke-width="3" opacity="0.1"/>
  <line x1="300" y1="0" x2="450" y2="700" stroke="#c084fc" stroke-width="2" opacity="0.15"/>
  <line x1="300" y1="0" x2="550" y2="600" stroke="#c084fc" stroke-width="1" opacity="0.2"/>
  <!-- Lantern -->
  <rect x="260" y="120" width="80" height="110" rx="10" fill="#f5d76e" opacity="0.9"/>
  <rect x="270" y="130" width="60" height="90" rx="6" fill="#fff9e6" opacity="0.95"/>
  <rect x="255" y="110" width="90" height="18" rx="4" fill="#c9a227"/>
  <rect x="293" y="90" width="14" height="22" rx="3" fill="#c9a227"/>
  <!-- Lantern cross lines -->
  <line x1="300" y1="130" x2="300" y2="220" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="175" x2="330" y2="175" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <!-- Glow beneath lantern -->
  <ellipse cx="300" cy="235" rx="60" ry="15" fill="#f5d76e" opacity="0.3"/>
  <!-- Floating particles/fireflies -->
  <circle cx="150" cy="350" r="3" fill="#f5d76e" opacity="0.7"/>
  <circle cx="420" cy="280" r="2" fill="#f5d76e" opacity="0.6"/>
  <circle cx="100" cy="200" r="2" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="480" cy="400" r="3" fill="#f5d76e" opacity="0.65"/>
  <circle cx="200" cy="450" r="2" fill="#c084fc" opacity="0.7"/>
  <circle cx="380" cy="500" r="2" fill="#f5d76e" opacity="0.55"/>
  <circle cx="520" cy="180" r="2" fill="#e9d5ff" opacity="0.4"/>
  <!-- Ground with light pool -->
  <ellipse cx="300" cy="620" rx="220" ry="30" fill="#9b59d0" opacity="0.15"/>
  <path d="M0 650 L600 650 L600 800 L0 800 Z" fill="#0d0020" opacity="0.8"/>
  <!-- Books stacked on ground -->
  <rect x="180" y="590" width="240" height="30" rx="3" fill="#7c3aed" opacity="0.8"/>
  <rect x="160" y="565" width="200" height="28" rx="3" fill="#5b21b6" opacity="0.8"/>
  <rect x="200" y="542" width="170" height="26" rx="3" fill="#6d28d9" opacity="0.8"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#c084fc" stroke-opacity="0.25" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#0d0020" opacity="0.8"/>
  <text x="300" y="715" fill="#e9d5ff" font-family="Georgia, serif" font-size="40" font-weight="700" text-anchor="middle">Borrowed Light</text>
  <text x="300" y="757" fill="#c084fc" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" opacity="0.85">Arif Hossain</text>
</svg>
