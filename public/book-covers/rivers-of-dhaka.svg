<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a2744"/>
      <stop offset="100%" stop-color="#0d3b6e"/>
    </linearGradient>
    <linearGradient id="river1" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a8fcc"/>
      <stop offset="100%" stop-color="#0d5f8a"/>
    </linearGradient>
    <linearGradient id="river2" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#25b8e8"/>
      <stop offset="100%" stop-color="#1a8fcc"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="30" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="420" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="520" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="20" r="1" fill="white" opacity="0.5"/>
  <circle cx="150" cy="100" r="1.5" fill="white" opacity="0.3"/>
  <!-- Moon reflection / Dhaka skyline silhouette -->
  <rect x="60" y="480" width="12" height="80" fill="#0b3361" opacity="0.9"/>
  <rect x="90" y="450" width="18" height="110" fill="#0b3361" opacity="0.9"/>
  <rect x="130" y="470" width="14" height="90" fill="#0b3361" opacity="0.9"/>
  <rect x="160" y="440" width="22" height="120" fill="#0b3361" opacity="0.9"/>
  <rect x="200" y="460" width="16" height="100" fill="#0b3361" opacity="0.9"/>
  <rect x="240" y="450" width="20" height="110" fill="#0b3361" opacity="0.9"/>
  <rect x="280" y="435" width="30" height="125" fill="#0b3361" opacity="0.9"/>
  <rect x="325" y="455" width="18" height="105" fill="#0b3361" opacity="0.9"/>
  <rect x="360" y="445" width="22" height="115" fill="#0b3361" opacity="0.9"/>
  <rect x="400" y="465" width="16" height="95" fill="#0b3361" opacity="0.9"/>
  <rect x="440" y="448" width="20" height="112" fill="#0b3361" opacity="0.9"/>
