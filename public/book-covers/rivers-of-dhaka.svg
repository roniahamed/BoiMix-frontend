  <rect x="510" y="455" width="18" height="105" fill="#0b3361" opacity="0.9"/>
  <!-- Rivers -->
  <path d="M0 560 C100 530 200 590 300 558 C400 525 500 575 600 550 L600 800 L0 800 Z" fill="url(#river1)" opacity="0.85"/>
  <path d="M0 620 C120 600 220 650 320 625 C420 600 520 640 600 618 L600 800 L0 800 Z" fill="url(#river2)" opacity="0.9"/>
  <!-- Moon -->
  <circle cx="460" cy="130" r="55" fill="#f5c842" opacity="0.9"/>
  <circle cx="475" cy="118" r="50" fill="#0a2744"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="white" stroke-opacity="0.15" stroke-width="6"/>
  <!-- Title area -->
  <rect x="0" y="680" width="600" height="120" fill="#061528" opacity="0.7"/>
  <text x="300" y="725" fill="#f5c842" font-family="Georgia, serif" font-size="42" font-weight="700" text-anchor="middle">Rivers of Dhaka</text>
  <text x="300" y="765" fill="white" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" opacity="0.75">Nadia Rahman</text>
</svg>
