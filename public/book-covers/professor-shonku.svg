<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="robot-glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#robot-glow)"/>
  <!-- Professor Shonku robot/invention feel -->
  <!-- Robot body -->
  <rect x="215" y="280" width="170" height="200" rx="15" fill="#1e40af" opacity="0.8" stroke="#3b82f6" stroke-width="2"/>
  <!-- Robot head -->
  <rect x="230" y="210" width="140" height="80" rx="12" fill="#1d4ed8" opacity="0.9" stroke="#3b82f6" stroke-width="2"/>
  <!-- Robot eyes -->
  <ellipse cx="268" cy="248" rx="20" ry="20" fill="#06b6d4" opacity="0.9"/>
  <ellipse cx="332" cy="248" rx="20" ry="20" fill="#06b6d4" opacity="0.9"/>
  <ellipse cx="268" cy="248" rx="12" ry="12" fill="#0c4a6e" opacity="0.9"/>
  <ellipse cx="332" cy="248" rx="12" ry="12" fill="#0c4a6e" opacity="0.9"/>
  <circle cx="268" cy="248" r="5" fill="white" opacity="0.9"/>
  <circle cx="332" cy="248" r="5" fill="white" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="300" y1="210" x2="300" y2="170" stroke="#93c5fd" stroke-width="3"/>
  <circle cx="300" cy="162" r="10" fill="#06b6d4" opacity="0.9"/>
  <!-- Control panel on chest -->
  <rect x="240" y="320" width="120" height="80" rx="6" fill="#0c2a6a" opacity="0.8"/>
  <circle cx="265" cy="350" r="8" fill="#ef4444" opacity="0.8"/>
  <circle cx="300" cy="350" r="8" fill="#22c55e" opacity="0.8"/>
  <circle cx="335" cy="350" r="8" fill="#f59e0b" opacity="0.8"/>
  <line x1="250" y1="375" x2="350" y2="375" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="388" x2="320" y2="388" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Arms -->
  <rect x="155" y="300" width="60" height="30" rx="8" fill="#1e40af" opacity="0.8" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="385" y="300" width="60" height="30" rx="8" fill="#1e40af" opacity="0.8" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="240" y="478" width="45" height="70" rx="6" fill="#1e40af" opacity="0.8" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="315" y="478" width="45" height="70" rx="6" fill="#1e40af" opacity="0.8" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Floating particles -->
  <circle cx="100" cy="200" r="3" fill="#06b6d4" opacity="0.5"/>
  <circle cx="500" cy="300" r="4" fill="#06b6d4" opacity="0.4"/>
  <circle cx="450" cy="150" r="2" fill="#93c5fd" opacity="0.5"/>
  <circle cx="80" cy="400" r="3" fill="#06b6d4" opacity="0.4"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#010409" opacity="0.9"/>
  <text x="300" y="710" fill="#bae6fd" font-family="Georgia, serif" font-size="38" font-weight="700" text-anchor="middle">Professor</text>
  <text x="300" y="748" fill="#bae6fd" font-family="Georgia, serif" font-size="38" font-weight="700" text-anchor="middle">Shonku</text>
  <text x="300" y="778" fill="#38bdf8" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" opacity="0.85">Satyajit Ray</text>
</svg>
