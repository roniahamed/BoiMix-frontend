<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1a12"/>
      <stop offset="100%" stop-color="#0f2d18"/>
    </linearGradient>
    <radialGradient id="jungle-glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a1a12" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#jungle-glow)"/>
  <!-- Mangrove trees -->
  <rect x="40" y="350" width="25" height="300" fill="#14532d" opacity="0.8"/>
  <ellipse cx="52" cy="340" rx="50" ry="80" fill="#15803d" opacity="0.7"/>
  <ellipse cx="40" cy="300" rx="38" ry="60" fill="#166534" opacity="0.8"/>
  <rect x="530" y="350" width="25" height="300" fill="#14532d" opacity="0.8"/>
  <ellipse cx="543" cy="340" rx="50" ry="80" fill="#15803d" opacity="0.7"/>
  <ellipse cx="555" cy="300" rx="38" ry="60" fill="#166534" opacity="0.8"/>
  <!-- Middle trees -->
  <rect x="140" y="420" width="18" height="240" fill="#14532d" opacity="0.7"/>
  <ellipse cx="149" cy="410" rx="38" ry="60" fill="#16a34a" opacity="0.65"/>
  <rect x="430" y="420" width="18" height="240" fill="#14532d" opacity="0.7"/>
  <ellipse cx="439" cy="410" rx="38" ry="60" fill="#16a34a" opacity="0.65"/>
  <!-- Tiger stripes / Royal Bengal tiger face -->
  <ellipse cx="300" cy="380" rx="90" ry="100" fill="#d97706" opacity="0.9"/>
  <ellipse cx="300" cy="380" rx="70" ry="80" fill="#fbbf24" opacity="0.8"/>
  <!-- Tiger stripes -->
  <path d="M230 330 Q250 355 230 380" stroke="#78350f" stroke-width="8" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M215 355 Q235 375 218 400" stroke="#78350f" stroke-width="7" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M370 330 Q350 355 370 380" stroke="#78350f" stroke-width="8" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M385 355 Q365 375 382 400" stroke="#78350f" stroke-width="7" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- Tiger eyes -->
  <ellipse cx="270" cy="360" rx="16" ry="18" fill="#10b981" opacity="0.95"/>
  <ellipse cx="330" cy="360" rx="16" ry="18" fill="#10b981" opacity="0.95"/>
  <ellipse cx="270" cy="362" rx="8" ry="14" fill="#1a0a00" opacity="0.95"/>
  <ellipse cx="330" cy="362" rx="8" ry="14" fill="#1a0a00" opacity="0.95"/>
  <!-- Tiger nose -->
  <path d="M292 395 Q300 405 308 395" fill="#c2410c" opacity="0.8"/>
  <ellipse cx="300" cy="392" rx="12" ry="7" fill="#c2410c" opacity="0.8"/>
  <!-- Whiskers -->
  <line x1="240" y1="408" x2="282" y2="400" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="235" y1="418" x2="280" y2="412" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="360" y1="408" x2="318" y2="400" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="365" y1="418" x2="320" y2="412" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Water below -->
  <path d="M0 560 C100 540 200 580 300 555 C400 530 500 570 600 545 L600 800 L0 800Z" fill="#155e47" opacity="0.6"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#4ade80" stroke-opacity="0.2" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#030f07" opacity="0.9"/>
  <text x="300" y="710" fill="#bbf7d0" font-family="Georgia, serif" font-size="33" font-weight="700" text-anchor="middle">Sundarbans</text>
  <text x="300" y="748" fill="#bbf7d0" font-family="Georgia, serif" font-size="33" font-weight="700" text-anchor="middle">Adventure</text>
  <text x="300" y="778" fill="#4ade80" font-family="Arial, sans-serif" font-size="21" text-anchor="middle" opacity="0.85">Muhammed Zafar Iqbal</text>
</svg>
