<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1a0a"/>
      <stop offset="100%" stop-color="#1a2e12"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Dhaka Metro train outline -->
  <rect x="80" y="300" width="440" height="160" rx="20" fill="#1e3a5f" opacity="0.9" stroke="#3b82f6" stroke-width="2"/>
  <rect x="80" y="300" width="440" height="40" rx="20" fill="#2563eb" opacity="0.8"/>
  <!-- Windows -->
  <rect x="110" y="355" width="60" height="70" rx="6" fill="#bfdbfe" opacity="0.7"/>
  <rect x="200" y="355" width="60" height="70" rx="6" fill="#bfdbfe" opacity="0.7"/>
  <rect x="290" y="355" width="60" height="70" rx="6" fill="#bfdbfe" opacity="0.7"/>
  <rect x="380" y="355" width="60" height="70" rx="6" fill="#bfdbfe" opacity="0.7"/>
  <!-- Headlights -->
  <circle cx="105" cy="385" r="12" fill="#fbbf24" opacity="0.8"/>
  <ellipse cx="105" cy="385" rx="25" ry="10" fill="#fbbf24" opacity="0.2"/>
  <!-- Rail tracks -->
  <line x1="30" y1="470" x2="570" y2="470" stroke="#9ca3af" stroke-width="4" opacity="0.7"/>
  <line x1="30" y1="482" x2="570" y2="482" stroke="#9ca3af" stroke-width="4" opacity="0.7"/>
  <!-- Track ties -->
  <rect x="50" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="110" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="170" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="230" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="290" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="350" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="410" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="470" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <rect x="530" y="465" width="8" height="22" fill="#6b7280" opacity="0.6"/>
  <!-- City skyline silhouette -->
  <rect x="50" y="180" width="30" height="125" fill="#0d2137" opacity="0.8"/>
  <rect x="100" y="150" width="40" height="155" fill="#0d2137" opacity="0.8"/>
  <rect x="160" y="200" width="25" height="105" fill="#0d2137" opacity="0.8"/>
  <rect x="200" y="140" width="50" height="165" fill="#0d2137" opacity="0.8"/>
  <rect x="390" y="160" width="45" height="145" fill="#0d2137" opacity="0.8"/>
  <rect x="450" y="190" width="30" height="115" fill="#0d2137" opacity="0.8"/>
  <rect x="490" y="145" width="55" height="160" fill="#0d2137" opacity="0.8"/>
  <!-- Night sky gradient top-->
  <rect x="0" y="0" width="600" height="160" fill="#070e1a" opacity="0.5"/>
  <circle cx="80" cy="70" r="2" fill="white" opacity="0.5"/>
  <circle cx="250" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="480" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="540" cy="50" r="1" fill="white" opacity="0.4"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#050e1a" opacity="0.9"/>
  <text x="300" y="710" fill="#bfdbfe" font-family="Georgia, serif" font-size="35" font-weight="700" text-anchor="middle">Dhaka Metro</text>
  <text x="300" y="748" fill="#bfdbfe" font-family="Georgia, serif" font-size="35" font-weight="700" text-anchor="middle">Diary</text>
  <text x="300" y="778" fill="#60a5fa" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" opacity="0.85">Nayeem Islam</text>
</svg>
