<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c3320"/>
      <stop offset="100%" stop-color="#1a5c38"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Background circles / exchange motif -->
  <circle cx="200" cy="320" r="130" stroke="#4ade80" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="400" cy="320" r="130" stroke="#4ade80" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Intersection highlight -->
  <ellipse cx="300" cy="320" rx="40" ry="80" fill="#4ade80" opacity="0.12"/>
  <!-- Book icon left -->
  <rect x="105" y="265" width="90" height="120" rx="6" fill="#16a34a" opacity="0.9"/>
  <rect x="115" y="275" width="70" height="100" rx="4" fill="#bbf7d0" opacity="0.7"/>
  <line x1="130" y1="295" x2="170" y2="295" stroke="#16a34a" stroke-width="2"/>
  <line x1="130" y1="310" x2="170" y2="310" stroke="#16a34a" stroke-width="2"/>
  <line x1="130" y1="325" x2="155" y2="325" stroke="#16a34a" stroke-width="2"/>
  <!-- Book icon right -->
  <rect x="405" y="265" width="90" height="120" rx="6" fill="#15803d" opacity="0.9"/>
  <rect x="415" y="275" width="70" height="100" rx="4" fill="#bbf7d0" opacity="0.7"/>
  <line x1="430" y1="295" x2="470" y2="295" stroke="#15803d" stroke-width="2"/>
  <line x1="430" y1="310" x2="470" y2="310" stroke="#15803d" stroke-width="2"/>
  <line x1="430" y1="325" x2="455" y2="325" stroke="#15803d" stroke-width="2"/>
  <!-- Arrows between books -->
  <path d="M215 300 L370 300" stroke="#4ade80" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M385 340 L230 340" stroke="#86efac" stroke-width="3"/>
  <polygon points="370,294 385,300 370,306" fill="#4ade80"/>
  <polygon points="230,334 215,340 230,346" fill="#86efac"/>
  <!-- Decorative dots -->
  <circle cx="80" cy="100" r="5" fill="#4ade80" opacity="0.4"/>
  <circle cx="520" cy="150" r="4" fill="#4ade80" opacity="0.3"/>
  <circle cx="100" cy="650" r="6" fill="#86efac" opacity="0.25"/>
  <circle cx="500" cy="600" r="5" fill="#86efac" opacity="0.3"/>
  <!-- Wavy bottom -->
  <path d="M0 700 C100 670 200 720 300 690 C400 660 500 710 600 680 L600 800 L0 800 Z" fill="#0c3320" opacity="0.8"/>
  <!-- Border frame -->
  <rect x="30" y="30" width="540" height="740" rx="12" stroke="#4ade80" stroke-opacity="0.2" stroke-width="5"/>
  <!-- Title area -->
  <rect x="0" y="670" width="600" height="130" fill="#071a10" opacity="0.85"/>
  <text x="300" y="715" fill="#bbf7d0" font-family="Georgia, serif" font-size="42" font-weight="700" text-anchor="middle">Swap Stories</text>
  <text x="300" y="757" fill="#4ade80" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" opacity="0.85">Maliha Karim</text>
</svg>
